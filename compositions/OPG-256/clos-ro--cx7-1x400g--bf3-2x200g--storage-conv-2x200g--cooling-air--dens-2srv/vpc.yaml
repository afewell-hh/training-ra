# Hedgehog VPC CRDs -- OPG-256 Clos Rail-Optimized (Air-Cooled)
# Generated: 2026-03-12
# Frontend fabric VPC definitions for converged SO-C/storage/management
#
# VPCs:
#   vpc-compute    -- VLAN 100/101 -- GPU server SO-C and job services
#   vpc-storage    -- VLAN 200/201 -- NVMe-oF data + metadata
#   vpc-management -- VLAN 300/301 -- in-band mgmt + controllers
---
apiVersion: vpc.githedgehog.com/v1beta1
kind: VPC
metadata:
  name: vpc-compute
  labels:
    fabric.githedgehog.com/composition: opg-256-air
spec:
  description: Compute network -- GPU server SO-C traffic, NCCL/collective operations
  subnets:
    compute-primary:
      cidr: 10.100.0.0/20
      gateway: 10.100.0.1
      vlanId: 100
      description: Primary compute subnet -- GPU servers
    compute-services:
      cidr: 10.100.16.0/24
      gateway: 10.100.16.1
      vlanId: 101
      description: Compute services subnet -- job schedulers, orchestration
---
apiVersion: vpc.githedgehog.com/v1beta1
kind: VPC
metadata:
  name: vpc-storage
  labels:
    fabric.githedgehog.com/composition: opg-256-air
spec:
  description: Storage network -- NVMe-oF/RDMA data plane between compute and storage servers
  subnets:
    storage-data:
      cidr: 10.101.0.0/20
      gateway: 10.101.0.1
      vlanId: 200
      description: Storage data subnet -- NVMe-oF/RoCEv2 traffic
    storage-metadata:
      cidr: 10.101.16.0/24
      gateway: 10.101.16.1
      vlanId: 201
      description: Storage metadata subnet -- metadata servers
---
apiVersion: vpc.githedgehog.com/v1beta1
kind: VPC
metadata:
  name: vpc-management
  labels:
    fabric.githedgehog.com/composition: opg-256-air
spec:
  description: In-band management network -- provisioning, monitoring, telemetry
  subnets:
    mgmt-primary:
      cidr: 10.102.0.0/24
      gateway: 10.102.0.1
      vlanId: 300
      description: Management subnet -- all servers and gateways
    mgmt-controllers:
      cidr: 10.102.1.0/24
      gateway: 10.102.1.1
      vlanId: 301
      description: Controller subnet -- Hedgehog controllers
---
